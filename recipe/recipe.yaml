# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
context:
  version: "3.8.1"

recipe:
  name: mujoco-split
  version: ${{ version }}

source:
  - url: https://github.com/deepmind/mujoco/archive/refs/tags/${{ version }}.tar.gz
    sha256: 6eb7db9f772a71c7097dd56d0cc7d5e8eb9c760420fe0355d41a11ff9f3f6d6d
    patches:
      - patches/0001-python_remove_avx.patch
      - patches/0002-cxx_devendor.patch
      - patches/0003-python_devendor.patch
      - patches/0004-ccd_vec3_origin_link_problem.patch
      - patches/0005-disable_copy_cxx_files_in_python_package.patch
      - patches/0006-do_not_install_via_pip.patch
      - patches/0008-simulate_as_shared_library.patch
      - patches/0011-Disable-isolation-and-dependency-check-in-python-bui.patch
      - patches/0012-Add-MUJOCO_SAMPLE_COMMAND_PREFIX-to-add-prefix-to-OU.patch
      - patches/0013-Add-optional-prefix-for-simulate-command.patch
      - patches/0014-always-install-mujoco-samples.patch
      - patches/0015-CMake-use-CMAKE_REQUIRED_LINK_OPTIONS-instead-of-CMA.patch
      - patches/0016-Add-MSYS-as-a-Windows-platform.patch
      - patches/0017-unvendor-tinyobjloader.patch

build:
  number: 0

outputs:
  - package:
      name: libmujoco
    build:
      script:
        - if: unix
          then: build_cxx.sh
        - if: win
          then: bld_cxx.bat
    requirements:
      build:
        - cmake
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - if: linux or osx
          then:
            - make
        - ninja
        - if: win
          then:
            - clang 19.*
            - lld 19.*
            - llvm-tools 19.*          # provides llvm-lib
      host:
        - eigen
        - qhull
        - tinyxml2
        - libccd-double
        - libabseil
        - lodepng
        - glfw
        - libtinyobjloader >=2.0.0rc13
        - if: linux
          then:
            - libgl-devel
      run:
        - if: linux
          then:
            - libgl-devel
      run_exports:
        - ${{ pin_subpackage("libmujoco", upper_bound="x.x.x") }}
      run_constraints:
        # Older version of this package were named mujoco-cxx, we want to avoid that they are installed
        - mujoco-cxx <0
      ignore_run_exports:
        # libabseil is used only for tests, we can
        # safely ignore its run_exports
        from_package:
          - libabseil
    tests:
      # Header and core shared library via rattler-build helper
      - package_contents:
          include:
            - mujoco/mujoco.h
            - simulate/simulate.h
          lib:
            - mujoco
            - simulate
          bin:
            - mujoco-simulate
      # Manual checks for plugins (needed on Windows where there is no .lib)
      - script:
          - cmake-package-check mujoco --targets mujoco::mujoco mujoco::libmujoco_simulate
          - if: unix
            then:
              - test -f ${PREFIX}/bin/mujoco_plugin/libactuator${SHLIB_EXT}
              - test -f ${PREFIX}/bin/mujoco_plugin/libelasticity${SHLIB_EXT}
              - test -f ${PREFIX}/bin/mujoco_plugin/libobj_decoder${SHLIB_EXT}
              - test -f ${PREFIX}/bin/mujoco_plugin/libsensor${SHLIB_EXT}
              - test -f ${PREFIX}/bin/mujoco_plugin/libsdf_plugin${SHLIB_EXT}
              - test -f ${PREFIX}/bin/mujoco_plugin/libstl_decoder${SHLIB_EXT}
              - test ! -f "$PREFIX/bin/simulate"
          - if: win
            then:
              - if not exist %LIBRARY_BIN%\mujoco_plugin\actuator.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\actuator.lib exit 1
              - if not exist %LIBRARY_BIN%\mujoco_plugin\elasticity.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\elasticity.lib exit 1
              - if not exist %LIBRARY_BIN%\mujoco_plugin\obj_decoder.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\obj_decoder.lib exit 1
              - if not exist %LIBRARY_BIN%\mujoco_plugin\sensor.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\sensor.lib exit 1
              - if not exist %LIBRARY_BIN%\mujoco_plugin\sdf_plugin.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\sdf_plugin.lib exit 1
              - if not exist %LIBRARY_BIN%\mujoco_plugin\stl_decoder.dll exit 1
              - if exist     %LIBRARY_BIN%\mujoco_plugin\stl_decoder.lib exit 1
              - if exist %LIBRARY_BIN%\simulate.exe exit 1
        requirements:
          run:
            - cmake-package-check
            - ${{ compiler('c') }}
            - ${{ compiler('cxx') }}
    about:
      license: Apache-2.0
      license_file:
        - LICENSE
  # -------------------------------------------------------------------------
  # Command-line samples
  # -------------------------------------------------------------------------
  - package:
      name: mujoco-samples
    build:
      script:
        - if: unix
          then: build_samples.sh
        - if: win
          then: bld_samples.bat
    requirements:
      build:
        - cmake
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - ninja
      host:
        - if: linux
          then:
            - libgl-devel
        - ${{ pin_subpackage("libmujoco", exact=True) }}
        - glfw
      run:
        # Somehow the libmujoco run_exports is ignored here, let's add explicitly the run dependency
        - ${{ pin_subpackage("libmujoco", upper_bound="x.x.x") }}
    tests:
      - package_contents:
          bin:
            - mujoco-testspeed
      - script:
          - if: unix
            then: test ! -f "$PREFIX/bin/testspeed"
          - if: win
            then: if exist %LIBRARY_BIN%\testspeed.exe exit 1

  # Dummy output, ketps for back compatibility
  - package:
      name: mujoco-simulate
    requirements:
      run:
        - ${{ pin_subpackage("libmujoco", exact=True) }}
    tests:
      - script:
          - if: unix
            then: test -f "$PREFIX/bin/mujoco-simulate"
          - if: win
            then: if not exist %LIBRARY_BIN%\mujoco-simulate.exe exit 1

  - package:
      name: mujoco-python
    build:
      script:
        - if: unix
          then: build_py.sh
        - if: win
          then: bld_py.bat
    requirements:
      build:
        - ${{ compiler('c') }}
        - ${{ stdlib('c') }}
        - ${{ compiler('cxx') }}
        - if: linux or osx
          then:
            - make
            - bash
        - if: win
          then:
            - ninja
            - clang 19.*
            - lld 19.*
            - llvm-tools 19.*
            - m2-base
        - cmake
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
            - numpy
            - pip
            - setuptools
            - python-build
            - virtualenv
            - absl-py
      host:
        - ${{ pin_subpackage("libmujoco", exact=True) }}
        - eigen
        - libabseil
        - lodepng
        - python
        - pip
        - setuptools
        - python-build
        - virtualenv
        # workaround for some build failures in 3.3.7 with pybind11 3.0.2, if that works in newer mujoco version we can remove it
        - pybind11 3.0.1.*
        - pybind11-abi
        - numpy
        - absl-py
        - glfw
        - pyglfw
        - pyopengl
        - if: linux
          then:
            - libgl-devel
      run:
        - ${{ pin_subpackage("libmujoco", exact=True) }}
        - python
        - numpy
        - absl-py
        - pyglfw
        - pyopengl
        - etils
        - fsspec
        - importlib_resources
        - typing_extensions
        - zipp
    tests:
      - python:
          imports:
            - mujoco

      - script:
          # egl for emulated tests does not work nice
          - if: linux and x86_64
            then: |
              # test_delete and test_load_xml disabled due to https://github.com/google-deepmind/mujoco/pull/2160
              export MUJOCO_GL=egl
              pytest --pyargs mujoco -v -k "not (test_delete or test_load_xml)"
              pip check
          - if: osx
            then: |
              # On macOS and Linux the Azure runners can't load opengl and mujoco does not support loading egl
              # with software rendering on this platforms, so we pass MUJOCO_GL disable there
              export MUJOCO_GL=disable
              pytest --pyargs mujoco -v -k "not (test_delete or test_load_xml)"
              pip check
              # Regression test for https://github.com/conda-forge/mujoco-feedstock/issues/64
              # Commented out until it is fixed, see https://github.com/conda-forge/mujoco-feedstock/pull/85#issuecomment-2953716989
              # mjpython --version
          - if: win
            then: |
              set MUJOCO_GL=disable
              pytest --pyargs mujoco -v -k "not (test_delete or test_load_xml)"
              pip check
          - if: linux and not x86_64
            then: |
              pip check
        requirements:
          run:
            - pytest
            - pip
            # sysid deps
            - absl-py
            - colorama
            - imageio-ffmpeg
            - jinja2
            - matplotlib-base
            - plotly
            - pyyaml
            - scipy
            - tabulate
            - typing_extensions

  - package:
      name: mujoco-mjx
    build:
      noarch: python
      skip:
        # Only build on linux64, as noarch it will be then available everywhere
        - not (linux and x86_64)
        # Build during Python 3.11 pass so mujoco-python cp311 is available for
        # testing (jax/jaxlib >= 0.7 requires Python >= 3.11)
        - if: match(python, "<3.11")
          then: true
      script: python -m pip install ./mjx/ --no-deps -vv
      python:
        entry_points:
          - mjx-testspeed = mujoco.mjx.testspeed:main
          - mjx-viewer = mujoco.mjx.viewer:main
    requirements:
      host:
        - pip
        - setuptools
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - jaxlib >=0.4.13
        - jax >=0.4.13
        - absl-py
        - scipy
        - trimesh
        - mujoco-python >=${{ version }}
        - etils
        - fsspec
        - importlib_resources
        - typing_extensions
        - zipp
    tests:
      - python:
          imports:
            - mujoco.mjx
      - script: |
          pip check
          # High-signal, fast(ish) smoke tests:
          # - import + JAX PyTree utilities
          # - MJX<->MuJoCo data roundtrip
          # - a single compiled `mjx.step` against MuJoCo reference
          pytest -v --pyargs \
            mujoco.mjx._src.dataclasses_test \
            mujoco.mjx._src.io_test \
            mujoco.mjx._src.forward_test \
            mujoco.mjx._src.support_test \
            -k "test_pytree_structure or test_fluid_params or test_get_data_runs or test_get_data_simplebody or test_make_matches_put or ForwardTest and test_step or test_custom or test_names_and_ids"
        requirements:
          run:
            - pip
            - pytest
            # We do not use python ${{ python_min }}.* as warp-lang may have other constraints
            - python
            # The [warp] extra is needed to run some of the tests, but we do not package it as 
            # mujoco-mjx-warp to avoid confusion with https://github.com/google-deepmind/mujoco_warp
            # The minimum pin is taken from https://github.com/google-deepmind/mujoco/blob/3.6.0/mjx/pyproject.toml#L37-L40,
            # but it is changed to a lower bound here to avoid conflicts on warp-lang and protobuf/abseil versions
            - warp-lang >=1.11.1
  - package:
      name: mujoco-sysid
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage("mujoco-python", upper_bound="x.x.x") }}
        - absl-py
        - colorama
        - imageio
        - imageio-ffmpeg
        - jinja2
        - matplotlib-base
        - plotly
        - pyyaml
        - scipy
        - tabulate
        - typing_extensions
    tests:
      - python:
          python_version: ${{ python_min }}.*
          imports:
            - mujoco.sysid
          pip_check: true

  - package:
      name: mujoco
    requirements:
      run:
        - ${{ pin_subpackage("libmujoco", exact=True) }}
        - ${{ pin_subpackage("mujoco-samples", exact=True) }}
        - ${{ pin_subpackage("mujoco-simulate", exact=True) }}
        - ${{ pin_subpackage("mujoco-python", upper_bound="x.x.x") }}
    tests:
      - python:
          imports:
            - mujoco

about:
  homepage: https://github.com/deepmind/mujoco
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: "Multi-Joint dynamics with Contact (MuJoCo): physics engine, CLI tools, GUI, Python bindings, and MJX."
extra:
  recipe-maintainers:
    - oursland
    - traversaro
